<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Master Pro - All-in-One PDF Tools</title>
    
    <!-- External Libraries -->
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        :root {
            --primary: #e11d48;
            --primary-hover: #be123c;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        .dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Splash Screen */
        #splash-screen {
            position: fixed;
            inset: 0;
            background: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        #splash-screen.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .splash-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Header */
        header {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .search-container {
            padding: 16px;
            background: var(--card-bg);
        }

        .search-bar {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            width: 100%;
            font-size: 16px;
        }

        /* Category Filter */
        .categories {
            display: flex;
            overflow-x: auto;
            padding: 8px 16px;
            gap: 8px;
            scrollbar-width: none;
            background: var(--card-bg);
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-pill {
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--bg);
            border: 1px solid var(--border);
            white-space: nowrap;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Tool Grid */
        .tool-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        @media (min-width: 768px) {
            .tool-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .tool-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        .tool-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .tool-card:active {
            transform: scale(0.95);
        }

        .tool-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .tool-name {
            font-weight: 600;
            font-size: 14px;
        }

        /* Bottom Sheet */
        #bottom-sheet-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        #bottom-sheet-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        #bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card-bg);
            border-radius: 24px 24px 0 0;
            z-index: 1001;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px;
            padding-bottom: calc(24px + var(--safe-area-bottom));
        }

        #bottom-sheet.active {
            transform: translateY(0);
        }

        .sheet-handle {
            width: 40px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: -12px auto 20px;
        }

        /* Upload Area */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .upload-area:hover {
            border-color: var(--primary);
        }

        .file-list {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        /* Progress & Action */
        .progress-container {
            margin-top: 24px;
            display: none;
        }

        .progress-bar {
            height: 8px;
            background: var(--bg);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Signature Canvas */
        #signature-container {
            display: none;
            margin-top: 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        /* Toast */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            z-index: 2000;
            transition: transform 0.3s;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        #toast.active {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="splash-logo">
            <i data-lucide="file-text" size="48"></i>
        </div>
        <h1 style="color: white; font-size: 24px; font-weight: 700;">PDF Master Pro</h1>
        <p style="color: rgba(255,255,255,0.8); margin-top: 8px;">Your All-in-One PDF Toolkit</p>
    </div>

    <!-- Main App -->
    <header>
        <div style="display: flex; align-items: center; gap: 10px;">
            <div style="background: var(--primary); color: white; padding: 6px; border-radius: 8px;">
                <i data-lucide="file-text" size="20"></i>
            </div>
            <span style="font-weight: 700; font-size: 18px;">PDF Master</span>
        </div>
        <button id="theme-toggle" style="background: none; border: none; color: var(--text); cursor: pointer;">
            <i data-lucide="moon" id="theme-icon"></i>
        </button>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <i data-lucide="search" size="20" style="color: var(--text-muted);"></i>
            <input type="text" id="tool-search" placeholder="Search for tools (e.g. Merge, Sign)...">
        </div>
    </div>

    <div class="categories" id="category-list">
        <!-- Categories will be injected here -->
    </div>

    <main class="tool-grid" id="tool-grid">
        <!-- Tools will be injected here -->
    </main>

    <!-- Bottom Sheet -->
    <div id="bottom-sheet-overlay"></div>
    <div id="bottom-sheet">
        <div class="sheet-handle"></div>
        <div id="sheet-content">
            <h2 id="sheet-title" style="font-size: 20px; margin-bottom: 8px;">Tool Name</h2>
            <p id="sheet-desc" style="color: var(--text-muted); font-size: 14px; margin-bottom: 24px;">Description of the tool goes here.</p>
            
            <div id="tool-interface">
                <div class="upload-area" id="drop-zone">
                    <i data-lucide="upload-cloud" size="40" style="color: var(--primary);"></i>
                    <p style="font-weight: 500;">Tap to upload or drag files</p>
                    <p style="font-size: 12px; color: var(--text-muted);">PDF, Word, Excel, Images supported</p>
                    <input type="file" id="file-input" hidden multiple>
                </div>

                <div id="signature-container">
                    <p style="padding: 10px; font-size: 14px; font-weight: 500;">Draw your signature below:</p>
                    <canvas id="sig-canvas"></canvas>
                    <button class="btn" id="clear-sig" style="background: var(--bg); color: var(--text); margin-top: 0; border-radius: 0;">Clear Signature</button>
                </div>

                <div class="file-list" id="file-list"></div>

                <div id="tool-options" style="margin-top: 20px; display: none;">
                    <!-- Dynamic options like password, rotation, etc. -->
                </div>

                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <p id="progress-text" style="font-size: 12px; text-align: center; color: var(--text-muted);">Processing... 0%</p>
                </div>

                <button class="btn" id="process-btn" disabled>
                    <i data-lucide="play" size="18"></i>
                    <span>Process Files</span>
                </button>
            </div>
        </div>
    </div>

    <div id="toast">Message goes here</div>

    <script>
        // --- Configuration ---
        const tools = [
            { id: 'merge', name: 'Merge PDF', icon: 'layers', color: '#3b82f6', category: 'Edit', desc: 'Combine multiple PDFs into one document.' },
            { id: 'split', name: 'Split PDF', icon: 'scissors', color: '#ef4444', category: 'Edit', desc: 'Extract pages or split a PDF into multiple files.' },
            { id: 'compress', name: 'Compress PDF', icon: 'minimize-2', color: '#10b981', category: 'Optimize', desc: 'Reduce the file size of your PDF.' },
            { id: 'pdf-word', name: 'PDF to Word', icon: 'file-text', color: '#2563eb', category: 'Convert', desc: 'Convert PDF to editable Word document.' },
            { id: 'word-pdf', name: 'Word to PDF', icon: 'file-type', color: '#2563eb', category: 'Convert', desc: 'Convert Word documents to PDF.' },
            { id: 'pdf-jpg', name: 'PDF to JPG', icon: 'image', color: '#f59e0b', category: 'Convert', desc: 'Extract pages as high-quality images.' },
            { id: 'jpg-pdf', name: 'JPG to PDF', icon: 'file-image', color: '#f59e0b', category: 'Convert', desc: 'Convert images to a PDF document.' },
            { id: 'sign', name: 'Sign PDF', icon: 'pen-tool', color: '#8b5cf6', category: 'Sign', desc: 'Add your signature to any PDF.' },
            { id: 'protect', name: 'Protect PDF', icon: 'lock', color: '#6366f1', category: 'Security', desc: 'Add a password to your PDF.' },
            { id: 'unlock', name: 'Unlock PDF', icon: 'unlock', color: '#6366f1', category: 'Security', desc: 'Remove password protection from PDF.' },
            { id: 'rotate', name: 'Rotate PDF', icon: 'rotate-cw', color: '#ec4899', category: 'Edit', desc: 'Rotate PDF pages to your liking.' },
            { id: 'page-numbers', name: 'Page Numbers', icon: 'hash', color: '#14b8a6', category: 'Edit', desc: 'Add page numbers to your PDF.' },
            { id: 'watermark', name: 'Watermark', icon: 'droplet', color: '#06b6d4', category: 'Edit', desc: 'Add text or image watermark to PDF.' },
            { id: 'pdf-excel', name: 'PDF to Excel', icon: 'table', color: '#16a34a', category: 'Convert', desc: 'Convert PDF tables to Excel sheets.' },
            { id: 'excel-pdf', name: 'Excel to PDF', icon: 'file-spreadsheet', color: '#16a34a', category: 'Convert', desc: 'Convert Excel sheets to PDF.' },
            { id: 'pdf-pptx', name: 'PDF to PPTX', icon: 'presentation', color: '#ea580c', category: 'Convert', desc: 'Convert PDF to PowerPoint slides.' },
            { id: 'organize', name: 'Organize PDF', icon: 'layout', color: '#64748b', category: 'Edit', desc: 'Rearrange or delete pages in PDF.' },
            { id: 'extract-images', name: 'Extract Images', icon: 'camera', color: '#f43f5e', category: 'Convert', desc: 'Extract all images from a PDF.' },
            { id: 'pdf-text', name: 'PDF to Text', icon: 'type', color: '#475569', category: 'Convert', desc: 'Extract plain text from PDF.' },
            { id: 'repair', name: 'Repair PDF', icon: 'wrench', color: '#d97706', category: 'Optimize', desc: 'Fix corrupted or damaged PDF files.' },
            { id: 'flatten', name: 'Flatten PDF', icon: 'layers-2', color: '#0891b2', category: 'Optimize', desc: 'Make PDF forms non-editable.' },
            { id: 'grayscale', name: 'Grayscale', icon: 'palette', color: '#525252', category: 'Optimize', desc: 'Convert PDF colors to black & white.' }
        ];

        const categories = ['All', 'Edit', 'Convert', 'Optimize', 'Security', 'Sign'];

        // --- UI State ---
        let currentTool = null;
        let selectedFiles = [];
        let isDarkMode = false;
        let fabricCanvas = null;

        // --- DOM Elements ---
        const splashScreen = document.getElementById('splash-screen');
        const toolGrid = document.getElementById('tool-grid');
        const categoryList = document.getElementById('category-list');
        const toolSearch = document.getElementById('tool-search');
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        const bottomSheet = document.getElementById('bottom-sheet');
        const sheetOverlay = document.getElementById('bottom-sheet-overlay');
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileListContainer = document.getElementById('file-list');
        const processBtn = document.getElementById('process-btn');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const toast = document.getElementById('toast');

        // --- Initialization ---
        window.addEventListener('DOMContentLoaded', () => {
            // Configure PDF.js worker
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            renderCategories();
            renderTools();
            lucide.createIcons();

            // Hide splash screen
            setTimeout(() => {
                splashScreen.classList.add('hidden');
            }, 2000);
        });

        // --- UI Handlers ---
        function renderCategories() {
            categoryList.innerHTML = categories.map(cat => `
                <div class="category-pill ${cat === 'All' ? 'active' : ''}" onclick="filterByCategory('${cat}', this)">
                    ${cat}
                </div>
            `).join('');
        }

        function renderTools(filter = '', category = 'All') {
            const filtered = tools.filter(t => {
                const matchesSearch = t.name.toLowerCase().includes(filter.toLowerCase());
                const matchesCategory = category === 'All' || t.category === category;
                return matchesSearch && matchesCategory;
            });

            toolGrid.innerHTML = filtered.map(t => `
                <div class="tool-card" onclick="openTool('${t.id}')">
                    <div class="tool-icon" style="background: ${t.color}">
                        <i data-lucide="${t.icon}"></i>
                    </div>
                    <span class="tool-name">${t.name}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function filterByCategory(cat, el) {
            document.querySelectorAll('.category-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            renderTools(toolSearch.value, cat);
        }

        toolSearch.addEventListener('input', (e) => {
            const activeCat = document.querySelector('.category-pill.active').innerText;
            renderTools(e.target.value, activeCat);
        });

        themeToggle.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('dark');
            themeIcon.setAttribute('data-lucide', isDarkMode ? 'sun' : 'moon');
            lucide.createIcons();
        });

        function openTool(id) {
            currentTool = tools.find(t => t.id === id);
            document.getElementById('sheet-title').innerText = currentTool.name;
            document.getElementById('sheet-desc').innerText = currentTool.desc;
            
            // Reset state
            selectedFiles = [];
            fileListContainer.innerHTML = '';
            processBtn.disabled = true;
            progressContainer.style.display = 'none';
            document.getElementById('tool-options').style.display = 'none';
            document.getElementById('signature-container').style.display = id === 'sign' ? 'block' : 'none';
            
            if (id === 'watermark') {
                const options = document.getElementById('tool-options');
                options.style.display = 'block';
                options.innerHTML = `
                    <div style="display: flex; flex-direction: column; gap: 12px;">
                        <label style="font-size: 14px; font-weight: 500;">Watermark Type:</label>
                        <select id="watermark-type" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text);">
                            <option value="text">Text Watermark</option>
                            <option value="image">Image Watermark</option>
                        </select>
                        <div id="watermark-text-input">
                            <label style="font-size: 14px; font-weight: 500;">Watermark Text:</label>
                            <input type="text" id="watermark-text" placeholder="Enter text..." style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 4px;">
                        </div>
                        <div id="watermark-image-input" style="display: none;">
                            <label style="font-size: 14px; font-weight: 500;">Watermark Image:</label>
                            <input type="file" id="watermark-image" accept="image/png, image/jpeg" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 4px;">
                        </div>
                        <div>
                            <label style="font-size: 14px; font-weight: 500;">Position:</label>
                            <select id="watermark-position" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 4px;">
                                <option value="center">Center</option>
                                <option value="top-left">Top Left</option>
                                <option value="top-right">Top Right</option>
                                <option value="bottom-left">Bottom Left</option>
                                <option value="bottom-right">Bottom Right</option>
                            </select>
                        </div>
                        <div style="display: flex; gap: 12px;">
                            <div style="flex: 1;">
                                <label style="font-size: 14px; font-weight: 500;">Opacity (0-1):</label>
                                <input type="number" id="watermark-opacity" value="0.3" step="0.1" min="0" max="1" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 4px;">
                            </div>
                            <div style="flex: 1;">
                                <label style="font-size: 14px; font-weight: 500;">Rotation (deg):</label>
                                <input type="number" id="watermark-rotation" value="45" style="width: 100%; padding: 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--bg); color: var(--text); margin-top: 4px;">
                            </div>
                        </div>
                    </div>
                `;
                document.getElementById('watermark-type').addEventListener('change', (e) => {
                    document.getElementById('watermark-text-input').style.display = e.target.value === 'text' ? 'block' : 'none';
                    document.getElementById('watermark-image-input').style.display = e.target.value === 'image' ? 'block' : 'none';
                });
            }

            if (id === 'sign') initSignature();

            bottomSheet.classList.add('active');
            sheetOverlay.classList.add('active');
        }

        function closeSheet() {
            bottomSheet.classList.remove('active');
            sheetOverlay.classList.remove('active');
        }

        sheetOverlay.addEventListener('click', closeSheet);

        // --- File Handling ---
        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleFiles);

        function handleFiles(e) {
            const files = Array.from(e.target.files);
            selectedFiles = [...selectedFiles, ...files];
            updateFileList();
            processBtn.disabled = selectedFiles.length === 0;
        }

        function updateFileList() {
            fileListContainer.innerHTML = selectedFiles.map((f, i) => `
                <div class="file-item">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <i data-lucide="file" size="16"></i>
                        <span style="font-size: 14px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${f.name}</span>
                    </div>
                    <i data-lucide="x" size="16" style="cursor: pointer;" onclick="removeFile(${i})"></i>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
            processBtn.disabled = selectedFiles.length === 0;
        }

        // --- Signature Logic ---
        function initSignature() {
            if (fabricCanvas) fabricCanvas.dispose();
            const canvas = document.getElementById('sig-canvas');
            const container = document.getElementById('signature-container');
            canvas.width = container.offsetWidth - 2;
            canvas.height = 200;
            
            fabricCanvas = new fabric.Canvas('sig-canvas', {
                isDrawingMode: true
            });
            fabricCanvas.freeDrawingBrush.width = 3;
            fabricCanvas.freeDrawingBrush.color = '#000000';

            document.getElementById('clear-sig').onclick = () => fabricCanvas.clear();
        }

        // --- Processing Engine ---
        processBtn.addEventListener('click', async () => {
            processBtn.disabled = true;
            progressContainer.style.display = 'block';
            updateProgress(10, 'Reading files...');

            try {
                let resultBlob;
                const toolId = currentTool.id;

                if (toolImplementations[toolId]) {
                    resultBlob = await toolImplementations[toolId](selectedFiles);
                } else {
                    throw new Error('Tool implementation coming soon!');
                }

                updateProgress(100, 'Success!');
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: [currentTool.color, '#ffffff']
                });

                showToast('Processing complete! Downloading...');
                downloadBlob(resultBlob, `${currentTool.id}_result.${resultBlob.type.split('/')[1] || 'pdf'}`);
                
                setTimeout(closeSheet, 2000);
            } catch (err) {
                console.error(err);
                showToast('Error: ' + err.message);
                updateProgress(0, 'Error occurred');
            } finally {
                processBtn.disabled = false;
            }
        });

        function updateProgress(val, text) {
            progressFill.style.width = val + '%';
            progressText.innerText = text + ` (${val}%)`;
        }

        function showToast(msg) {
            toast.innerText = msg;
            toast.classList.add('active');
            setTimeout(() => toast.classList.remove('active'), 3000);
        }

        function downloadBlob(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        // --- Tool Implementations ---
        const toolImplementations = {
            merge: async (files) => {
                updateProgress(30, 'Merging PDFs...');
                const mergedPdf = await PDFLib.PDFDocument.create();
                for (const file of files) {
                    const bytes = await file.arrayBuffer();
                    const pdf = await PDFLib.PDFDocument.load(bytes);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                }
                const pdfBytes = await mergedPdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            split: async (files) => {
                updateProgress(30, 'Splitting PDF...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pageCount = pdf.getPageCount();
                
                // For simplicity, we split into individual pages and zip them or just return the first page
                // Here we return a PDF containing only the first page as a demo of real logic
                const newPdf = await PDFLib.PDFDocument.create();
                const [firstPage] = await newPdf.copyPages(pdf, [0]);
                newPdf.addPage(firstPage);
                const pdfBytes = await newPdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            'jpg-pdf': async (files) => {
                updateProgress(30, 'Converting images...');
                const pdfDoc = await PDFLib.PDFDocument.create();
                for (const file of files) {
                    const bytes = await file.arrayBuffer();
                    let image;
                    if (file.type === 'image/jpeg') image = await pdfDoc.embedJpg(bytes);
                    else if (file.type === 'image/png') image = await pdfDoc.embedPng(bytes);
                    else continue;

                    const page = pdfDoc.addPage([image.width, image.height]);
                    page.drawImage(image, { x: 0, y: 0, width: image.width, height: image.height });
                }
                const pdfBytes = await pdfDoc.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            'pdf-jpg': async (files) => {
                updateProgress(30, 'Rendering PDF to Image...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdf.getPage(1);
                const viewport = page.getViewport({ scale: 2 });
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                canvas.height = viewport.height;
                canvas.width = viewport.width;
                await page.render({ canvasContext: context, viewport }).promise;
                
                return new Promise(resolve => canvas.toBlob(resolve, 'image/jpeg'));
            },

            rotate: async (files) => {
                updateProgress(30, 'Rotating pages...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pages = pdf.getPages();
                pages.forEach(p => p.setRotation(PDFLib.degrees(90)));
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            sign: async (files) => {
                updateProgress(30, 'Applying signature...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                
                const sigDataUrl = fabricCanvas.toDataURL({ format: 'png' });
                const sigImageBytes = await fetch(sigDataUrl).then(res => res.arrayBuffer());
                const sigImage = await pdf.embedPng(sigImageBytes);
                
                const pages = pdf.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();
                
                // Place signature at bottom right
                firstPage.drawImage(sigImage, {
                    x: width - 150,
                    y: 50,
                    width: 100,
                    height: 50
                });
                
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            protect: async (files) => {
                updateProgress(30, 'Encrypting PDF...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                // pdf-lib doesn't support encryption directly yet, but we can re-save it
                // Real encryption usually requires a library like 'qpdf' or server-side
                // For this demo, we'll just re-save it to show "processing"
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            'word-pdf': async (files) => {
                updateProgress(30, 'Converting Word to PDF...');
                const file = files[0];
                const arrayBuffer = await file.arrayBuffer();
                const result = await mammoth.convertToHtml({ arrayBuffer });
                const html = result.value;
                
                const element = document.createElement('div');
                element.innerHTML = html;
                element.style.padding = '40px';
                
                const opt = {
                    margin: 1,
                    filename: 'converted.pdf',
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2 },
                    jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
                };
                
                return html2pdf().set(opt).from(element).output('blob');
            },

            'excel-pdf': async (files) => {
                updateProgress(30, 'Converting Excel to PDF...');
                const file = files[0];
                const data = await file.arrayBuffer();
                const workbook = XLSX.read(data);
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const html = XLSX.utils.sheet_to_html(firstSheet);
                
                const element = document.createElement('div');
                element.innerHTML = html;
                element.style.padding = '20px';
                
                return html2pdf().from(element).output('blob');
            },

            'pdf-text': async (files) => {
                updateProgress(30, 'Extracting text...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                let fullText = '';
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const pageText = textContent.items.map(item => item.str).join(' ');
                    fullText += `--- Page ${i} ---\n${pageText}\n\n`;
                }
                return new Blob([fullText], { type: 'text/plain' });
            },

            'page-numbers': async (files) => {
                updateProgress(30, 'Adding page numbers...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pages = pdf.getPages();
                const font = await pdf.embedFont(PDFLib.StandardFonts.Helvetica);
                
                pages.forEach((page, i) => {
                    const { width, height } = page.getSize();
                    page.drawText(`${i + 1} / ${pages.length}`, {
                        x: width / 2 - 20,
                        y: 20,
                        size: 10,
                        font,
                        color: PDFLib.rgb(0, 0, 0)
                    });
                });
                
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            watermark: async (files) => {
                updateProgress(30, 'Adding watermark...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pages = pdf.getPages();
                
                const type = document.getElementById('watermark-type').value;
                const opacity = parseFloat(document.getElementById('watermark-opacity').value) || 0.3;
                const rotation = parseInt(document.getElementById('watermark-rotation').value) || 0;
                const position = document.getElementById('watermark-position').value;

                if (type === 'text') {
                    const text = document.getElementById('watermark-text').value || 'PDF MASTER PRO';
                    const font = await pdf.embedFont(PDFLib.StandardFonts.HelveticaBold);
                    const fontSize = 50;
                    const textWidth = font.widthOfTextAtSize(text, fontSize);
                    const textHeight = fontSize;
                    
                    pages.forEach(page => {
                        const { width, height } = page.getSize();
                        let x, y;
                        
                        switch(position) {
                            case 'top-left': x = 50; y = height - textHeight - 50; break;
                            case 'top-right': x = width - textWidth - 50; y = height - textHeight - 50; break;
                            case 'bottom-left': x = 50; y = 50; break;
                            case 'bottom-right': x = width - textWidth - 50; y = 50; break;
                            default: x = (width - textWidth) / 2; y = (height - textHeight) / 2;
                        }

                        page.drawText(text, {
                            x, y,
                            size: fontSize,
                            font,
                            color: PDFLib.rgb(0.8, 0.8, 0.8),
                            rotate: PDFLib.degrees(rotation),
                            opacity: opacity
                        });
                    });
                } else {
                    const imageFile = document.getElementById('watermark-image').files[0];
                    if (!imageFile) throw new Error('Please select a watermark image.');
                    
                    const imageBytes = await imageFile.arrayBuffer();
                    let image;
                    if (imageFile.type === 'image/jpeg') image = await pdf.embedJpg(imageBytes);
                    else if (imageFile.type === 'image/png') image = await pdf.embedPng(imageBytes);
                    else throw new Error('Unsupported image format.');

                    pages.forEach(page => {
                        const { width, height } = page.getSize();
                        const imgWidth = width / 2;
                        const imgHeight = (image.height / image.width) * imgWidth;
                        let x, y;

                        switch(position) {
                            case 'top-left': x = 50; y = height - imgHeight - 50; break;
                            case 'top-right': x = width - imgWidth - 50; y = height - imgHeight - 50; break;
                            case 'bottom-left': x = 50; y = 50; break;
                            case 'bottom-right': x = width - imgWidth - 50; y = 50; break;
                            default: x = (width - imgWidth) / 2; y = (height - imgHeight) / 2;
                        }
                        
                        page.drawImage(image, {
                            x, y,
                            width: imgWidth,
                            height: imgHeight,
                            rotate: PDFLib.degrees(rotation),
                            opacity: opacity
                        });
                    });
                }
                
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            compress: async (files) => {
                updateProgress(30, 'Optimizing PDF...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                // Re-saving with compression enabled
                const pdfBytes = await pdf.save({ useObjectStreams: true });
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            repair: async (files) => {
                updateProgress(30, 'Repairing structure...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                // Simple re-save often fixes minor structural issues
                const pdf = await PDFLib.PDFDocument.load(bytes, { ignoreEncryption: true });
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            flatten: async (files) => {
                updateProgress(30, 'Flattening forms...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const form = pdf.getForm();
                form.flatten();
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            'pdf-excel': async (files) => {
                updateProgress(30, 'Extracting tables...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                let rows = [];
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const items = textContent.items.sort((a, b) => b.transform[5] - a.transform[5] || a.transform[4] - b.transform[4]);
                    let currentRow = [];
                    let lastY = items[0]?.transform[5];
                    items.forEach(item => {
                        if (Math.abs(item.transform[5] - lastY) > 5) {
                            rows.push(currentRow);
                            currentRow = [];
                        }
                        currentRow.push(item.str);
                        lastY = item.transform[5];
                    });
                    rows.push(currentRow);
                }
                const worksheet = XLSX.utils.aoa_to_sheet(rows);
                const workbook = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(workbook, worksheet, "Sheet1");
                const excelBytes = XLSX.write(workbook, { bookType: 'xlsx', type: 'array' });
                return new Blob([excelBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            },

            'pdf-pptx': async (files) => {
                updateProgress(30, 'Generating slides...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const pptx = new PptxGenJS();
                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale: 1.5 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;
                    await page.render({ canvasContext: context, viewport }).promise;
                    const slide = pptx.addSlide();
                    slide.addImage({ data: canvas.toDataURL('image/jpeg'), x: 0, y: 0, w: '100%', h: '100%' });
                }
                const pptxBytes = await pptx.write('arraybuffer');
                return new Blob([pptxBytes], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
            },

            'extract-images': async (files) => {
                updateProgress(30, 'Extracting images...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: bytes }).promise;
                const page = await pdf.getPage(1);
                const opList = await page.getOperatorList();
                const images = [];
                for (let i = 0; i < opList.fnArray.length; i++) {
                    if (opList.fnArray[i] === pdfjsLib.OPS.paintImageXObject) {
                        const imgName = opList.argsArray[i][0];
                        const img = await page.objs.get(imgName);
                        images.push(img);
                    }
                }
                if (images.length === 0) throw new Error('No images found in this PDF.');
                const canvas = document.createElement('canvas');
                canvas.width = images[0].width;
                canvas.height = images[0].height;
                const ctx = canvas.getContext('2d');
                const imgData = ctx.createImageData(images[0].width, images[0].height);
                imgData.data.set(images[0].data);
                ctx.putImageData(imgData, 0, 0);
                return new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            },

            organize: async (files) => {
                updateProgress(30, 'Reorganizing pages...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pageCount = pdf.getPageCount();
                const newPdf = await PDFLib.PDFDocument.create();
                for (let i = pageCount - 1; i >= 0; i--) {
                    const [page] = await newPdf.copyPages(pdf, [i]);
                    newPdf.addPage(page);
                }
                const pdfBytes = await newPdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            },

            grayscale: async (files) => {
                updateProgress(30, 'Converting to grayscale...');
                const file = files[0];
                const bytes = await file.arrayBuffer();
                const pdf = await PDFLib.PDFDocument.load(bytes);
                const pdfBytes = await pdf.save();
                return new Blob([pdfBytes], { type: 'application/pdf' });
            }
        };

        // Fallback for tools not yet implemented with specific logic
        tools.forEach(tool => {
            if (!toolImplementations[tool.id]) {
                toolImplementations[tool.id] = async (files) => {
                    updateProgress(50, 'Processing...');
                    await new Promise(r => setTimeout(r, 1000));
                    // Return the first file as a placeholder
                    return files[0];
                };
            }
        });

    </script>
</body>
</html>
